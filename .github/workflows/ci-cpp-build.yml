name: C++ Build and Run

on:
  push:
    branches: [main, hw]
  pull_request:
    branches: [main, hw]

jobs:
  build-docker:
    uses: ./.github/workflows/docker-build.yml

  test:
    name: Build and Test
    needs: build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: cpp_course-image

      - name: Load Docker image
        run: docker load -i cpp_course_image.tar

      - name: Run tests in container
        run: |
          # Create results directory on host
          mkdir -p test-results

          # Mount repository and results directory
          docker run --name cpp_course_container \
            -v ${{ github.workspace }}:/workspace \
            bmstu_cpp_course-bmstu:latest \
            bash -c "cd /workspace && \
                    mkdir -p build && \
                    cd build && \
                    cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS='-fprofile-arcs -ftest-coverage' && \
                    cmake --build . && \
                    cd .. && \
                    mkdir -p test-results && \
                    # Run only our project's test executables, not GoogleTest's Python tests
                    for test_bin in \$(find build/tasks -type f -executable); do \
                      echo \"Running \$test_bin\" && \
                      \$test_bin --gtest_output=xml:test-results/\$(basename \$test_bin).xml || true; \
                    done && \
                    # Copy test results to host-mounted directory
                    cp -r test-results/* /workspace/test-results/ || true"

          # Show what test results were found
          echo "Found test results:"
          ls -la test-results/

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test_results_xml
          path: test-results/
          if-no-files-found: warn
          retention-days: 5

      - name: Create XSLT stylesheet
        if: always()
        run: |
          cat > transform.xsl << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <xsl:stylesheet version="1.0" xmlns:xsl="http://www.w3.org/1999/XSL/Transform">
            <xsl:output method="html" indent="yes"/>

            <!-- Корневой шаблон -->
            <xsl:template match="/">
              <html>
                <head>
                  <title>Отчет о тестах Google Test</title>
                  <style>
                    body { font-family: Arial, sans-serif; }
                    h1 { color: #333; }
                    h2 { color: #555; }
                    .passed { color: green; }
                    .failed { color: red; }
                    ul { list-style-type: none; padding: 0; }
                    li { margin: 5px 0; }
                  </style>
                </head>
                <body>
                  <h1>Результаты тестов Google Test</h1>
                  <!-- Обработка каждого тестового набора -->
                  <xsl:for-each select="testsuites/testsuite">
                    <h2>Тестовый набор: <xsl:value-of select="@name"/></h2>
                    <ul>
                      <!-- Обработка каждого теста -->
                      <xsl:for-each select="testcase">
                        <li>
                          <span>
                            <xsl:attribute name="class">
                              <xsl:choose>
                                <xsl:when test="failure">failed</xsl:when>
                                <xsl:otherwise>passed</xsl:otherwise>
                              </xsl:choose>
                            </xsl:attribute>
                            <!-- Надпись и эмодзи в зависимости от результата -->
                            <xsl:choose>
                              <xsl:when test="failure">
                                Тест провален ❌
                              </xsl:when>
                              <xsl:otherwise>
                                Тест пройден ✅
                              </xsl:otherwise>
                            </xsl:choose>
                            <xsl:text> </xsl:text>
                            <xsl:value-of select="@name"/>
                          </span>
                          <!-- Вывод сообщения об ошибке, если тест провален -->
                          <xsl:if test="failure">
                            <div style="margin-left: 20px; color: red;">
                              Ошибка: <xsl:value-of select="failure/@message"/>
                            </div>
                          </xsl:if>
                        </li>
                      </xsl:for-each>
                    </ul>
                    <!-- Общая статистика по тестовому набору -->
                    <p>
                      Тестов: <xsl:value-of select="@tests"/>, 
                      Провалов: <xsl:value-of select="@failures"/>, 
                      Ошибок: <xsl:value-of select="@errors"/>, 
                      Пропущено: <xsl:value-of select="@skipped"/>
                    </p>
                  </xsl:for-each>
                  <!-- Общая статистика по всем тестам -->
                  <h2>Итог</h2>
                  <p>
                    Всего тестов: <xsl:value-of select="testsuites/@tests"/>, 
                    Всего провалов: <xsl:value-of select="testsuites/@failures"/>, 
                    Всего ошибок: <xsl:value-of select="testsuites/@errors"/>, 
                    Всего пропущено: <xsl:value-of select="testsuites/@skipped"/>
                  </p>
                </body>
              </html>
            </xsl:template>
          </xsl:stylesheet>
          EOF

      - name: Install xsltproc
        if: always()
        run: sudo apt-get update && sudo apt-get install -y xsltproc

      - name: Merge XML reports
        if: always()
        run: |
          # Create combined XML file
          echo '<?xml version="1.0" encoding="UTF-8"?>' > merged_results.xml
          echo '<testsuites>' >> merged_results.xml
          
          # Add test counts 
          total_tests=0
          total_failures=0
          total_errors=0
          total_skipped=0
          
          for xml_file in test-results/*.xml; do
            if [ -f "$xml_file" ]; then
              # Extract content without XML declaration
              content=$(grep -v '<?xml' "$xml_file" | sed -n '/<testsuite/,/<\/testsuite>/p')
              echo "$content" >> merged_results.xml
              
              # Get test stats
              tests=$(grep -o 'tests="[0-9]*"' "$xml_file" | head -1 | grep -o '[0-9]*' || echo "0")
              failures=$(grep -o 'failures="[0-9]*"' "$xml_file" | head -1 | grep -o '[0-9]*' || echo "0")
              errors=$(grep -o 'errors="[0-9]*"' "$xml_file" | head -1 | grep -o '[0-9]*' || echo "0")
              skipped=$(grep -o 'skipped="[0-9]*"' "$xml_file" | head -1 | grep -o '[0-9]*' || echo "0")
              
              # Update totals
              total_tests=$((total_tests + tests))
              total_failures=$((total_failures + failures))
              total_errors=$((total_errors + errors))
              total_skipped=$((total_skipped + skipped))
            fi
          done
          
          # Close testsuites element
          echo '</testsuites>' >> merged_results.xml
          
          # Update the testsuites tag with totals
          sed -i "s/<testsuites>/<testsuites tests=\"$total_tests\" failures=\"$total_failures\" errors=\"$total_errors\" skipped=\"$total_skipped\">/" merged_results.xml
          
          # Create default if no tests found
          if ! grep -q "<testsuite" merged_results.xml; then
            echo '<?xml version="1.0" encoding="UTF-8"?>' > merged_results.xml
            echo '<testsuites tests="0" failures="0" errors="0" skipped="0">' >> merged_results.xml
            echo '</testsuites>' >> merged_results.xml
          fi

      - name: Generate HTML report
        if: always()
        run: |
          # Create HTML report directory
          mkdir -p html-report
          
          # Generate main HTML report from merged XML
          xsltproc -o html-report/index.html transform.xsl merged_results.xml
          
          # Also generate individual HTML reports for each test file
          for xml_file in test-results/*.xml; do
            if [ -f "$xml_file" ]; then
              base_name=$(basename "$xml_file" .xml)
              xsltproc -o "html-report/${base_name}.html" transform.xsl "$xml_file"
            fi
          done
          
          # Copy the XML files to HTML report directory for reference
          cp test-results/*.xml html-report/ || true
          cp merged_results.xml html-report/ || true
          
          # Add index listing all reports
          cat > html-report/reports.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Google Test Reports</title>
            <style>
              body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px; }
              h1 { color: #0066cc; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 10px 0; padding: 10px; background-color: #f5f5f5; border-radius: 5px; }
              a { color: #0066cc; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Available Test Reports</h1>
            <ul>
              <li><a href="index.html">Combined Test Report</a> - All test results</li>
          EOF
          
          # Add links to individual reports
          for html_file in html-report/*.html; do
            base_name=$(basename "$html_file")
            if [[ "$base_name" != "index.html" && "$base_name" != "reports.html" ]]; then
              echo "    <li><a href=\"$base_name\">$(basename "$base_name" .html)</a></li>" >> html-report/reports.html
            fi
          done
          
          # Close HTML
          echo "  </ul></body></html>" >> html-report/reports.html
          
          echo "HTML reports generated successfully"

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_results_html
          path: html-report/
          retention-days: 5

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/**/*.xml
          check_name: GTest Results
