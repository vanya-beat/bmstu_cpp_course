name: C++ Build and Run

on:
  push:
    branches: [main, hw]
  pull_request:
    branches: [main, hw]

jobs:
  build-docker:
    uses: ./.github/workflows/docker-build.yml

  test:
    name: Build and Test
    needs: build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: cpp_course-image

      - name: Load Docker image
        run: docker load -i cpp_course_image.tar

      - name: Run tests in container
        run: |
          # Create results directory on host
          mkdir -p test-results

          # Mount repository and results directory
          docker run --name cpp_course_container \
            -v ${{ github.workspace }}:/workspace \
            bmstu_cpp_course-bmstu:latest \
            bash -c "cd /workspace && \
                    mkdir -p build && \
                    cd build && \
                    cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS='-fprofile-arcs -ftest-coverage' && \
                    cmake --build . && \
                    cd .. && \
                    mkdir -p test-results && \
                    # Run only our project's test executables, not GoogleTest's Python tests
                    for test_bin in \$(find build/tasks -type f -executable); do \
                      echo \"Running \$test_bin\" && \
                      \$test_bin --gtest_output=xml:test-results/\$(basename \$test_bin).xml || true; \
                    done && \
                    # Copy test results to host-mounted directory
                    cp -r test-results/* /workspace/test-results/ || true"

          # Show what test results were found
          echo "Found test results:"
          ls -la test-results/

      - name: Upload XML test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test_results_xml
          path: test-results/
          if-no-files-found: warn
          retention-days: 5

      - name: Create merged XML file for combined report
        if: always()
        run: |
          echo "<testsuites>" > merged_results.xml
          for xml_file in test-results/*.xml; do
            if [ -f "$xml_file" ]; then
              # Remove xml declaration and root elements, keep only inner content
              content=$(sed -n '/<testsuite/,/<\/testsuite>/p' "$xml_file")
              echo "$content" >> merged_results.xml
            fi
          done
          echo "</testsuites>" >> merged_results.xml
          # Check if the merged file is valid
          if [ -s merged_results.xml ]; then
            echo "Successfully created merged XML report"
          else
            echo "Failed to create merged report or no test results found"
            echo "<testsuites></testsuites>" > merged_results.xml
          fi

      - name: Prepare HTML test report viewer
        if: always()
        run: |
          # Create a directory for the HTML reports
          mkdir -p html-report
          
          # Copy the test viewer HTML template
          cat > html-report/index.html << 'EOF'
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSTU C++ Test Results</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #0066cc;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .summary-item {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .summary-item:hover {
            transform: translateY(-5px);
        }
        .total-tests {
            background-color: #e3f2fd;
            border: 1px solid #bbdefb;
        }
        .passed-tests {
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
        }
        .failed-tests {
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
        }
        .testsuite {
            background-color: #fff;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .testsuite.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .testsuite-header {
            background-color: #f1f1f1;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .testsuite-header h3 {
            margin: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
        }
        .testsuite-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .testsuite.active .testsuite-content {
            max-height: 2000px;
        }
        .testcase {
            padding: 15px;
            border-top: 1px solid #eee;
            transition: background-color 0.3s ease;
        }
        .testcase:hover {
            background-color: #f9f9f9;
        }
        .testcase h4 {
            margin: 0;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .success-icon, .failure-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            text-align: center;
            line-height: 20px;
            font-weight: bold;
        }
        .success-icon {
            background-color: #4caf50;
            color: white;
        }
        .failure-icon {
            background-color: #f44336;
            color: white;
        }
        .failure-detail {
            background-color: #fff0f0;
            padding: 15px;
            margin-top: 10px;
            border-left: 4px solid #f44336;
            border-radius: 4px;
            overflow-x: auto;
        }
        pre {
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            margin: 0;
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-success {
            background-color: #4caf50;
        }
        .status-failure {
            background-color: #f44336;
        }
        .suite-summary {
            font-size: 14px;
            color: #666;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 10px;
            background-color: #4caf50;
            width: 0%;
            transition: width 1s ease;
        }
        .bmstu-logo {
            height: 40px;
            margin-right: 15px;
            vertical-align: middle;
        }
        .time-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .expand-all {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .expand-all:hover {
            background-color: #0055aa;
        }
        #search-box {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background-color: #e0e0e0;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background-color: #0066cc;
            color: white;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        @media (max-width: 768px) {
            .summary {
                flex-direction: column;
            }
            .filter-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span style="font-size: 24px; margin-right: 10px;">🎓</span>BMSTU C++ Test Results</h1>
        </header>
        
        <div id="loading" class="loading">
            <p>Загрузка результатов тестов...</p>
        </div>

        <div id="results-container" style="display: none;">
            <div class="summary">
                <div class="summary-item total-tests">
                    <h2>Всего тестов</h2>
                    <div id="total-count" style="font-size: 30px;">0</div>
                </div>
                <div class="summary-item passed-tests">
                    <h2>Пройдено</h2>
                    <div id="passed-count" style="font-size: 30px; color: #4caf50;">0</div>
                </div>
                <div class="summary-item failed-tests">
                    <h2>Не пройдено</h2>
                    <div id="failed-count" style="font-size: 30px; color: #f44336;">0</div>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <input type="text" id="search-box" placeholder="Поиск по названию теста...">
            
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">Все тесты</button>
                <button class="filter-btn" data-filter="passed">Пройденные</button>
                <button class="filter-btn" data-filter="failed">Не пройденные</button>
                <button class="expand-all" id="expand-all">Развернуть все</button>
            </div>
            
            <div id="testsuites-container">
                <!-- Test suites will be added here -->
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Загрузка XML данных
            fetch('merged_results.xml')
                .then(response => response.text())
                .then(xmlString => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, 'text/xml');
                    
                    if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                        document.getElementById('loading').innerHTML = 
                            '<p style="color: red;">Ошибка загрузки результатов тестов. Попробуйте скачать XML файл напрямую.</p>';
                        return;
                    }
                    
                    displayTestResults(xmlDoc);
                })
                .catch(error => {
                    console.error('Error loading test results:', error);
                    document.getElementById('loading').innerHTML = 
                        '<p style="color: red;">Ошибка загрузки результатов тестов: ' + error.message + '</p>';
                });
            
            function displayTestResults(xmlDoc) {
                const testSuites = xmlDoc.getElementsByTagName('testsuite');
                let testSuitesHTML = '';
                
                if (testSuites.length === 0) {
                    document.getElementById('loading').innerHTML = 
                        '<p>Нет доступных результатов тестов.</p>';
                    return;
                }
                
                // Build HTML for each test suite
                for (let i = 0; i < testSuites.length; i++) {
                    const suite = testSuites[i];
                    const suiteName = suite.getAttribute('name') || 'Unknown';
                    const testCount = parseInt(suite.getAttribute('tests') || '0');
                    const failures = parseInt(suite.getAttribute('failures') || '0');
                    const time = parseFloat(suite.getAttribute('time') || '0');
                    
                    let suiteHTML = `
                    <div class="testsuite" data-delay="${i * 100}">
                        <div class="testsuite-header">
                            <h3>
                                <span class="status-dot ${failures === 0 ? 'status-success' : 'status-failure'}"></span>
                                ${suiteName}
                            </h3>
                            <span class="suite-summary">${testCount} тестов, ${failures} ошибок, ${time.toFixed(2)}с</span>
                        </div>
                        <div class="testsuite-content">
                    `;
                    
                    // Add test cases
                    const testCases = suite.getElementsByTagName('testcase');
                    for (let j = 0; j < testCases.length; j++) {
                        const test = testCases[j];
                        const testName = test.getAttribute('name') || 'Unknown Test';
                        const testTime = parseFloat(test.getAttribute('time') || '0');
                        const failures = test.getElementsByTagName('failure');
                        const hasFailure = failures.length > 0;
                        
                        suiteHTML += `
                        <div class="testcase" data-status="${hasFailure ? 'failed' : 'passed'}">
                            <h4>
                                ${hasFailure 
                                    ? '<span class="failure-icon">✗</span>' 
                                    : '<span class="success-icon">✓</span>'}
                                ${testName}
                            </h4>
                            <div class="time-info">Время выполнения: ${testTime.toFixed(4)}с</div>
                        `;
                        
                        if (hasFailure) {
                            const failure = failures[0];
                            const message = failure.getAttribute('message') || '';
                            const failureText = failure.textContent || '';
                            
                            suiteHTML += `
                            <div class="failure-detail">
                                <strong>Сообщение об ошибке:</strong> ${message}
                                <pre>${failureText}</pre>
                            </div>
                            `;
                        }
                        
                        suiteHTML += `</div>`;
                    }
                    
                    suiteHTML += `
                        </div>
                    </div>
                    `;
                    
                    testSuitesHTML += suiteHTML;
                }
                
                // Hide loading and show results
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results-container').style.display = 'block';
                document.getElementById('testsuites-container').innerHTML = testSuitesHTML;
                
                // Initialize interactions
                initializeInteractions();
                updateCounters();
                animateProgressBar();
            }
            
            function initializeInteractions() {
                const testSuites = document.querySelectorAll('.testsuite');
                const expandAllBtn = document.getElementById('expand-all');
                const searchBox = document.getElementById('search-box');
                const filterBtns = document.querySelectorAll('.filter-btn');
                let allExpanded = false;
                
                // Animation for test suites appearance
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => {
                                entry.target.classList.add('visible');
                            }, parseInt(entry.target.dataset.delay) || 0);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                
                testSuites.forEach(suite => {
                    observer.observe(suite);
                    
                    // Click handler for expanding/collapsing
                    const header = suite.querySelector('.testsuite-header');
                    header.addEventListener('click', () => {
                        suite.classList.toggle('active');
                    });
                });
                
                // Expand/collapse all button
                expandAllBtn.addEventListener('click', () => {
                    allExpanded = !allExpanded;
                    testSuites.forEach(suite => {
                        if (allExpanded) {
                            suite.classList.add('active');
                            expandAllBtn.textContent = 'Свернуть все';
                        } else {
                            suite.classList.remove('active');
                            expandAllBtn.textContent = 'Развернуть все';
                        }
                    });
                });
                
                // Search functionality
                searchBox.addEventListener('input', filterTests);
                
                // Filter buttons functionality
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        filterTests();
                    });
                });
            }
            
            function filterTests() {
                const searchTerm = document.getElementById('search-box').value.toLowerCase();
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                const testSuites = document.querySelectorAll('.testsuite');
                
                testSuites.forEach(suite => {
                    let suiteVisible = false;
                    const testcases = suite.querySelectorAll('.testcase');
                    
                    testcases.forEach(testcase => {
                        const testName = testcase.querySelector('h4').textContent.toLowerCase();
                        const testStatus = testcase.dataset.status;
                        
                        let visible = testName.includes(searchTerm);
                        
                        if (activeFilter === 'passed' && testStatus !== 'passed') visible = false;
                        if (activeFilter === 'failed' && testStatus !== 'failed') visible = false;
                        
                        testcase.style.display = visible ? 'block' : 'none';
                        if (visible) suiteVisible = true;
                    });
                    
                    suite.style.display = suiteVisible ? 'block' : 'none';
                });
            }
            
            function updateCounters() {
                const totalTests = document.querySelectorAll('.testcase').length;
                const passedTests = document.querySelectorAll('.testcase[data-status="passed"]').length;
                const failedTests = totalTests - passedTests;
                
                document.getElementById('total-count').textContent = totalTests;
                document.getElementById('passed-count').textContent = passedTests;
                document.getElementById('failed-count').textContent = failedTests;
            }
            
            function animateProgressBar() {
                const totalTests = document.querySelectorAll('.testcase').length;
                const passedTests = document.querySelectorAll('.testcase[data-status="passed"]').length;
                const percentage = totalTests > 0 ? (passedTests / totalTests) * 100 : 0;
                
                setTimeout(() => {
                    document.getElementById('progress-bar').style.width = percentage + '%';
                }, 500);
            }
        });
    </script>
</body>
</html>
EOF

          # Copy the XML test results to the HTML directory
          cp merged_results.xml html-report/

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_results_html
          path: html-report/
          retention-days: 5

      - name: Deploy test report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html-report
          destination_dir: test-reports
          keep_files: false

      - name: Post report URL
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "::notice::📊 Отчет о тестировании доступен по адресу: https://${{ github.repository_owner }}.github.io/bmstu_cpp_course/test-reports/"
